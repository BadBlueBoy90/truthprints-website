<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 · TruthPrints</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/brand/truthprints-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0705;--p:#EAE1CC;--pd:#A89D82;--pm:#6F6650;--g:#B8924A;--gb:#D4AC63;
--fd:"Cormorant Garamond",Georgia,serif;--fb:"Inter",-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
background:radial-gradient(ellipse 75% 60% at 50% 42%,#16100a 0%,var(--ink) 75%);
color:var(--p);font-family:var(--fb);text-align:center;padding:32px}
.c{max-width:580px}
.num{font-family:var(--fd);font-weight:300;font-size:clamp(90px,16vw,170px);line-height:1;
color:transparent;-webkit-text-stroke:1px var(--g);letter-spacing:.04em}
.verse{font-family:var(--fd);font-style:italic;font-size:clamp(21px,3vw,30px);line-height:1.6;
color:var(--p);margin:34px 0 10px}
.ref{font-family:var(--fb);font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:var(--g);margin-bottom:38px}
.sub{font-family:var(--fd);font-style:italic;font-size:16px;color:var(--pm);margin-bottom:38px;line-height:1.8}
.btn{display:inline-block;font-family:var(--fb);font-size:11px;letter-spacing:.26em;
text-transform:uppercase;font-weight:600;color:var(--ink);
background:linear-gradient(135deg,var(--g),var(--gb));padding:15px 36px;text-decoration:none;transition:filter .25s}
.btn:hover{filter:brightness(1.12)}
.links{margin-top:26px;display:flex;gap:26px;justify-content:center;flex-wrap:wrap}
.links a{font-family:var(--fb);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
color:var(--pd);text-decoration:none;border-bottom:1px solid rgba(184,146,74,.3);padding-bottom:3px;transition:color .25s}
.links a:hover{color:var(--gb)}
</style>
</head>
<body>
<div class="c">
  <div class="num">404</div>
  <p class="verse">&bdquo;Ich bin der Weg und die Wahrheit und das Leben.&ldquo;</p>
  <div class="ref">Johannes 14,6</div>
  <p class="sub">Diese Seite gibt es nicht &mdash; aber der Weg zur&uuml;ck ist nie verloren.</p>
  <a class="btn" href="/">Zur Startseite</a>
  <div class="links">
    <a href="/read/">Bibel lesen</a>
    <a href="/#shop">Shop</a>
    <a href="/#plates">Tafeln</a>
    <a href="/#about">&Uuml;ber</a>
  </div>
</div>
</body>
</html>
